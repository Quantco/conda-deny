[project]
name = "my-project"
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.conda-deny]
license-allowlist = "tests/test_lockfile_pattern/license_allowlist.toml"
lockfile = "tests/test_lockfile_pattern/**/*.lock"

# Avoid GitHub tooling trying to autoupdate this pixi.toml
[tool.update]
autoupdate-schedule = "never"
